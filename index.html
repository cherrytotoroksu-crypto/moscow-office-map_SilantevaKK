<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Офисный рынок Москвы</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; }
    #map { width: 100vw; height: 100vh; }

    .panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      padding: 8px 12px;
      width: 210px;
      font-size: 12px;
      max-height: calc(100vh - 20px);
      overflow-y: auto;
    }
    .panel h3 {
      font-size: 10px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin: 5px 0 3px;
    }
    .panel h3:first-child { margin-top: 0; }
    .panel hr { border: none; border-top: 1px solid #eee; margin: 5px 0; }

    .radio-row, .check-row {
      display: flex; align-items: center; gap: 6px;
      margin: 1.5px 0; cursor: pointer; color: #333;
      line-height: 1.25;
    }
    .radio-row input, .check-row input { cursor: pointer; flex-shrink: 0; }

    select {
      width: 100%; padding: 3px 5px;
      border: 1px solid #ddd; border-radius: 4px;
      font-size: 12px; margin-top: 1px; cursor: pointer;
    }

    /* Кнопка загрузки */
    .upload-btn {
      display: block; width: 100%; margin-top: 4px;
      padding: 5px; background: #3b82f6; color: white;
      border: none; border-radius: 5px; font-size: 11px;
      cursor: pointer; text-align: center;
    }
    .upload-btn:hover { background: #2563eb; }
    #fileStatus {
      margin-top: 3px; font-size: 11px; color: #555;
      min-height: 14px;
    }
    .stat-row {
      display: flex; justify-content: space-between;
      font-size: 11px; margin: 1px 0;
      color: #444;
    }
    .stat-row span:last-child { font-weight: 600; color: #111; }

    /* Контейнер легенд (левый нижний угол, стопкой вверх) */
    .left-stack {
      position: absolute;
      bottom: 24px; left: 10px;
      z-index: 1000;
      display: flex; flex-direction: column-reverse;
      align-items: flex-start; gap: 8px;
      max-height: calc(100vh - 48px);
      pointer-events: none;
    }
    .left-stack > * { pointer-events: auto; }

    /* Легенда */
    .legend {
      background: white; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      padding: 10px 14px; font-size: 12px; min-width: 190px;
    }
    .legend h4 {
      font-size: 11px; font-weight: 700; color: #666;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .legend-gradient {
      height: 12px; border-radius: 3px;
      background: linear-gradient(to right, #ffffcc, #fd8d3c, #800026);
    }
    .legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #666; margin: 3px 0 8px; }
    .legend-item { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
    .lswatch { width: 22px; height: 12px; border-radius: 2px; flex-shrink: 0; }
    .no-data-row { display: flex; align-items: center; gap: 7px; }

    /* Таблица деловых районов (когда геометрия скрыта) */
    .stats-table {
      background: white; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      padding: 12px 14px; font-size: 12px;
      max-width: 360px; display: none;
      max-height: 50vh; overflow-y: auto;
    }
    .stats-table h4 { font-size: 12px; font-weight: 700; color: #333; margin-bottom: 8px; }
    .stats-table .note { font-size: 10px; color: #999; margin-bottom: 8px; }
    .stats-table table { border-collapse: collapse; width: 100%; }
    .stats-table th, .stats-table td { padding: 3px 8px; text-align: right; white-space: nowrap; }
    .stats-table th { color: #888; font-weight: 600; border-bottom: 1px solid #ddd; font-size: 10px; text-transform: uppercase; }
    .stats-table td:first-child, .stats-table th:first-child { text-align: left; }
    .stats-table tr:not(:last-child) td { border-bottom: 1px solid #f3f3f3; }
    .stats-table td.hl { font-weight: 700; color: #bd0026; }

    /* Легенда зданий (цвет = класс, размер = объём) */
    .buildings-legend {
      background: white; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      padding: 10px 14px; font-size: 12px; min-width: 150px;
    }
    .buildings-legend h4 { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 8px; }
    .buildings-legend .sub { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; margin: 8px 0 4px; }
    .bl-item { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
    .bl-dot { border-radius: 50%; border: 1px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); flex-shrink: 0; }
    .bl-size-row { display: flex; align-items: flex-end; gap: 12px; padding: 4px 2px 0; }
    .bl-size-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bl-size-circle { border-radius: 50%; background: #9ca3af; border: 1px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); }
    .bl-size-label { font-size: 9px; color: #777; }

    /* Модальное окно лотов */
    .modal-bg {
      position: absolute; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #fff; border-radius: 10px;
      width: min(760px, 92vw); max-height: 85vh;
      display: flex; flex-direction: column;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .modal-head {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; border-bottom: 1px solid #eee;
    }
    .modal-head h3 { font-size: 15px; flex: 1; color: #222; }
    .modal-head .sub { font-size: 12px; color: #888; }
    .modal-dl {
      padding: 6px 12px; background: #16a34a; color: #fff;
      border: none; border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    .modal-dl:hover { background: #15803d; }
    .modal-x {
      background: none; border: none; font-size: 22px; line-height: 1;
      color: #999; cursor: pointer; padding: 0 4px;
    }
    .modal-body { overflow: auto; padding: 12px 18px 16px; }
    .modal label { font-size: 12px; color: #555; }
    .modal label select { font-size: 12px; margin-left: 4px; padding: 3px 5px; border: 1px solid #ddd; border-radius: 4px; }
    .cmp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .cmp-table th, .cmp-table td { padding: 5px 8px; text-align: right; white-space: nowrap; border-bottom: 1px solid #f0f0f0; }
    .cmp-table th { position: sticky; top: 0; background: #fafafa; color: #666; font-size: 10px; text-transform: uppercase; }
    .cmp-table td:first-child, .cmp-table th:first-child { text-align: left; }
    .cmp-up { color: #16a34a; } .cmp-down { color: #dc2626; }
    .lots-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .lots-table th, .lots-table td { padding: 6px 8px; text-align: right; white-space: nowrap; border-bottom: 1px solid #f0f0f0; }
    .lots-table th { position: sticky; top: 0; background: #fafafa; color: #666; font-weight: 600; text-transform: uppercase; font-size: 10px; }
    .lots-table td:first-child, .lots-table th:first-child { text-align: left; }

    /* Popup */
    .leaflet-popup-content { font-size: 13px; min-width: 200px; }
    .popup-lots-btn {
      display: inline-block; margin-top: 8px; padding: 5px 10px;
      background: #3b82f6; color: #fff; border-radius: 5px;
      font-size: 12px; cursor: pointer; border: none;
    }
    .popup-lots-btn:hover { background: #2563eb; }
    .leaflet-popup-content b { font-size: 14px; }
    .prow { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #f0f0f0; gap: 8px; }
    .prow:last-child { border-bottom: none; }
    .plabel { color: #888; font-size: 11px; white-space: nowrap; }
    .pval { font-weight: 600; color: #222; text-align: right; }
  </style>
</head>
<body>
<div id="map"></div>

<!-- Правая панель -->
<div class="panel">
  <h3>Квартал</h3>
  <select id="quarterSelect"></select>

  <hr>
  <h3>Данные</h3>
  <div id="fileStatus">Загрузка…</div>
  <div id="fileStats" style="display:none; margin-top:5px; padding-top:5px; border-top:1px solid #eee; grid-template-columns:1fr 1fr; gap:0 12px;">
    <div class="stat-row"><span>Объектов</span><span id="statCount">—</span></div>
    <div class="stat-row"><span>Объём</span><span id="statVolume">—</span></div>
    <div class="stat-row"><span>Ср. цена</span><span id="statAvgPrice">—</span></div>
    <div class="stat-row"><span>Ср. взв.</span><span id="statWAvgPrice">—</span></div>
  </div>

  <hr>
  <h3>Аналитика</h3>
  <button class="upload-btn" id="openDynamics" style="background:#7c3aed;">📈 Динамика по кварталам</button>
  <button class="upload-btn" id="openCompare" style="margin-top:4px; background:#0891b2;">⇄ Сравнить кварталы</button>

  <hr>
  <h3>Деление для расчёта</h3>
  <label class="radio-row"><input type="radio" name="activeLayer" value="mo" checked> Адм. границы Москвы</label>
  <label class="radio-row"><input type="radio" name="activeLayer" value="ao"> Автономные округа</label>
  <label class="radio-row"><input type="radio" name="activeLayer" value="zones"> Зоны (кольца)</label>
  <label class="radio-row"><input type="radio" name="activeLayer" value="submarkets"> Субрынки</label>
  <label class="radio-row"><input type="radio" name="activeLayer" value="bizFormed"> Дел. районы (сформир.)</label>
  <label class="radio-row"><input type="radio" name="activeLayer" value="bizForming"> Дел. районы (формир.)</label>

  <hr>
  <h3>Показатель</h3>
  <select id="metricSelect">
    <option value="wavg">Ср. взвешенная цена (руб/кв.м)</option>
    <option value="avg">Ср. цена (руб/кв.м)</option>
    <option value="volume">Объём предложения (кв.м)</option>
    <option value="count">Кол-во объектов (шт.)</option>
  </select>

  <hr>
  <h3>Объекты (здания)</h3>
  <label class="check-row"><input type="checkbox" id="ovBuildings" checked> Показать здания</label>
  <label class="check-row"><input type="checkbox" id="ovCluster" checked> Группировать (кластеры)</label>

  <hr>
  <h3>Рисование и выгрузка</h3>
  <label class="check-row"><input type="checkbox" id="ovDraw"> Режим рисования</label>
  <button class="upload-btn" id="exportGeo" style="margin-top:5px;">⬇ Выгрузить GeoJSON</button>
  <button class="upload-btn" id="exportXlsx" style="margin-top:4px; background:#16a34a;">⬇ Выгрузить Excel</button>
  <div id="drawStatus" style="font-size:11px;color:#777;margin-top:5px;"></div>

  <hr>
  <h3>Доп. границы</h3>
  <label class="check-row"><input type="checkbox" id="ovMo" checked> Адм. границы</label>
  <label class="check-row"><input type="checkbox" id="ovAo"> Округа (АО)</label>
  <label class="check-row"><input type="checkbox" id="ovZones"> Зоны (кольца)</label>
  <label class="check-row"><input type="checkbox" id="ovSub"> Субрынки</label>
  <label class="check-row"><input type="checkbox" id="ovBizFormed"> Дел. районы (сформир.)</label>
  <label class="check-row"><input type="checkbox" id="ovBizForming"> Дел. районы (формир.)</label>

  <hr>
  <h3>Подложка</h3>
  <label class="radio-row"><input type="radio" name="basemap" value="carto" checked> Базовая карта</label>
  <label class="radio-row"><input type="radio" name="basemap" value="osm"> OSM</label>
  <label class="radio-row"><input type="radio" name="basemap" value="satellite"> Спутник</label>
</div>

<!-- Модальное окно лотов -->
<div class="modal-bg" id="lotsModalBg">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h3 id="lotsModalTitle">Лоты</h3>
        <div class="sub" id="lotsModalSub"></div>
      </div>
      <button class="modal-dl" id="lotsModalDownload">⬇ Скачать Excel</button>
      <button class="modal-x" id="lotsModalClose">&times;</button>
    </div>
    <div class="modal-body" id="lotsModalBody"></div>
  </div>
</div>

<!-- Модалка ДИНАМИКА -->
<div class="modal-bg" id="dynModalBg">
  <div class="modal" style="width:min(860px,94vw);">
    <div class="modal-head">
      <h3>📈 Динамика по кварталам</h3>
      <button class="modal-dl" id="dynDownload">⬇ Excel</button>
      <button class="modal-x" id="dynClose">&times;</button>
    </div>
    <div style="padding:10px 18px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; border-bottom:1px solid #eee;">
      <label>Уровень:
        <select id="dynLevel">
          <option value="division">По делениям</option>
          <option value="building">По зданиям</option>
        </select>
      </label>
      <label id="dynDivWrap">Деление:
        <select id="dynDivision">
          <option value="zones">Зоны (кольца)</option>
          <option value="ao">Автономные округа</option>
          <option value="submarkets">Субрынки</option>
          <option value="bizFormed">Дел. районы (сформир.)</option>
          <option value="bizForming">Дел. районы (формир.)</option>
        </select>
      </label>
      <label id="dynBldWrap" style="display:none;">Здание:
        <input id="dynBuildingSearch" type="text" placeholder="поиск…" autocomplete="off"
          style="font-size:12px;padding:3px 6px;border:1px solid #ddd;border-radius:4px;width:150px;">
        <select id="dynBuilding" style="max-width:260px;"></select>
      </label>
      <label>Показатель:
        <select id="dynMetric">
          <option value="wavg">Ср. взв. цена, руб/кв.м</option>
          <option value="avg">Ср. цена, руб/кв.м</option>
          <option value="volume">Объём, кв.м</option>
          <option value="count">Кол-во объектов</option>
          <option value="price">Цена здания, руб/кв.м</option>
          <option value="lots">Лотов, шт.</option>
        </select>
      </label>
    </div>
    <div class="modal-body"><canvas id="dynChart" height="150"></canvas></div>
  </div>
</div>

<!-- Модалка СРАВНЕНИЕ -->
<div class="modal-bg" id="cmpModalBg">
  <div class="modal" style="width:min(900px,94vw);">
    <div class="modal-head">
      <h3>⇄ Сравнение кварталов</h3>
      <button class="modal-dl" id="cmpDownload">⬇ Excel</button>
      <button class="modal-x" id="cmpClose">&times;</button>
    </div>
    <div style="padding:10px 18px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; border-bottom:1px solid #eee;">
      <label>Было: <select id="cmpFrom"></select></label>
      <label>Стало: <select id="cmpTo"></select></label>
      <label>Уровень:
        <select id="cmpLevel">
          <option value="zones">Зоны (кольца)</option>
          <option value="ao">Автономные округа</option>
          <option value="submarkets">Субрынки</option>
          <option value="bizFormed">Дел. районы (сформир.)</option>
          <option value="bizForming">Дел. районы (формир.)</option>
          <option value="building">Здания</option>
        </select>
      </label>
      <label>Показатель:
        <select id="cmpMetric">
          <option value="wavg">Ср. взв. цена</option>
          <option value="avg">Ср. цена</option>
          <option value="volume">Объём</option>
          <option value="count">Кол-во объектов</option>
        </select>
      </label>
    </div>
    <div class="modal-body" id="cmpBody"></div>
  </div>
</div>

<!-- Левая стопка легенд (снизу вверх: шкала/таблица → легенда зданий) -->
<div class="left-stack">
  <!-- Легенда -->
  <div class="legend" id="legend">
    <h4 id="legendTitle">Ср. взв. цена, руб/кв.м</h4>
    <div class="legend-gradient" id="legendGradient"></div>
    <div class="legend-labels"><span id="legendMin">мин</span><span id="legendMax">макс</span></div>
    <div class="no-data-row">
      <div class="lswatch" style="background:#e0e0e0; border:1px solid #bbb;"></div>
      <span>Нет данных</span>
    </div>
  </div>

  <!-- Сводная таблица деловых районов (геометрия временно скрыта) -->
  <div class="stats-table" id="statsTable"></div>

  <!-- Легенда зданий -->
  <div class="buildings-legend" id="buildingsLegend"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
// ============================================================
//  КВАРТАЛЫ
//  Чтобы добавить новый квартал: положи файл data/buildings_YYYYQN.json
//  и допиши строку в начало этого списка (новые сверху).
// ============================================================
const QUARTERS = [
  { id: '2026Q1', label: 'Q1 2026', file: 'data/buildings_2026Q1.json', lots: 'data/lots_2026Q1.json' },
  { id: '2025Q4', label: 'Q4 2025', file: 'data/buildings_2025Q4.json', lots: 'data/lots_2025Q4.json' },
  { id: '2025Q3', label: 'Q3 2025', file: 'data/buildings_2025Q3.json', lots: 'data/lots_2025Q3.json' },
];
let currentQuarter = QUARTERS[0];
let lotsData = {};   // { "Название здания": [ {block,floor,area,price,scheme,size}, ... ] }

// ============================================================
//  КОНФИГ СЛОЁВ
// ============================================================
const LAYER_CFG = {
  mo:         { file: 'data/mo.geojson',         nameField: 'NAME',    label: 'Адм. границы Москвы' },
  ao:         { file: 'data/ao.geojson',          nameField: 'NAME_AO', label: 'Автономные округа' },
  zones:      { file: 'data/zones.geojson',       nameField: 'name',    label: 'Зоны (кольца)' },
  submarkets: { file: 'data/submarkets.geojson',  nameField: 'name',    label: 'Субрынки' },
  // Деловые районы — настоящие полигоны (main_business_districts /
  // future business districts). Статистика — point-in-polygon.
  bizFormed:  { file: 'data/biz_formed.geojson',  nameField: 'name',     label: 'Деловые районы — сформированные' },
  bizForming: { file: 'data/biz_forming.geojson', nameField: 'district', label: 'Деловые районы — формирующиеся' },
};

// Кириллические подписи зон (в данных коды латиницей)
const ZONE_NAMES = {
  'BR': 'Центральное ядро (БК)',
  'BR-GR': 'БК–СК',
  'GR-TTR': 'СК–ТТК',
  'TTR-MKAD': 'ТТК–МКАД',
  'ZA-MKAD': 'за МКАД',
};
// Человекочитаемое название объекта слоя для попапа/подписи
function displayName(key, rawName) {
  if (key === 'zones') return ZONE_NAMES[rawName] || rawName;
  return rawName;
}

// Классификация деловых районов по таблице "субрынки названия.xlsx".
// Сформированные — устоявшиеся деловые районы; формирующиеся — развивающиеся.
const BIZ_FORMED = new Set([
  'Белорусский', 'Павелецкий', 'Ленинградский', 'Москва-Сити', 'Сити', 'ЦДР'
]);
const BIZ_FORMING = new Set([
  'Большой Сити', 'Ходынка', 'Савеловский', 'Калужский', 'Кутузовский',
  'Новая Москва', 'Северный речной порт', 'Южный речной порт', 'Южный порт'
]);
function bizClassOf(name) {
  if (BIZ_FORMED.has(name)) return 'bizFormed';
  if (BIZ_FORMING.has(name)) return 'bizForming';
  return null;
}

// Встроенные данные (используются когда файл не загружен)
const BUILTIN_ZONE_DATA = {
  'BR-GR':   { wavg: 1347753, avg: 1347753, volume: 1685,   count: 1  },
  'GR-TTR':  { wavg: 766747,  avg: 766747,  volume: 171153, count: 16 },
  'TTR-MKAD':{ wavg: 484406,  avg: 484406,  volume: 952703, count: 65 },

function makeColorScale(vals) {
  const sorted = vals.filter(v => v != null && isFinite(v)).sort((a,b) => a-b);
  if (!sorted.length) return { min: 0, max: 1, fn: () => '#e0e0e0' };
  const min = sorted[0], max = sorted[sorted.length - 1];
  // YlOrRd 7 классов
  const stops = [
    [0.00, '#ffffcc'], [0.17, '#ffeda0'], [0.33, '#fed976'],
    [0.50, '#feb24c'], [0.67, '#fd8d3c'], [0.83, '#f03b20'], [1.00, '#bd0026']
  ];
  function hexToRgb(h) {
    const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
    return [r,g,b];
  }
  function lerp(a, b, t) { return Math.round(a + (b-a)*t); }
  function colorAt(t) {
    for (let i = 1; i < stops.length; i++) {
      if (t <= stops[i][0]) {
        const t0 = stops[i-1][0], t1 = stops[i][0];
        const s = (t - t0) / (t1 - t0);
        const [r0,g0,b0] = hexToRgb(stops[i-1][1]);
        const [r1,g1,b1] = hexToRgb(stops[i][1]);
        return `rgb(${lerp(r0,r1,s)},${lerp(g0,g1,s)},${lerp(b0,b1,s)})`;
      }
    }
    return stops[stops.length-1][1];
  }
  return {
    min, max,
    fn: v => v == null ? null : colorAt((v - min) / (max - min || 1))
  };
}

// ============================================================
//  ВЫПУКЛАЯ ОБОЛОЧКА (Andrew's monotone chain)
// ============================================================
function convexHull(points) {
  const pts = points.slice().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
  if (pts.length < 3) return pts;
  const cross = (o, a, b) => (a[0]-o[0])*(b[1]-o[1]) - (a[1]-o[1])*(b[0]-o[0]);
  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = pts.length-1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
    upper.push(p);
  }
  lower.pop(); upper.pop();
  return lower.concat(upper);
}

// Небольшой буфер (квадрат) вокруг точки/линии для вырожденных оболочек
function bufferRing(coords, d) {
  if (coords.length === 1) {
    const [x, y] = coords[0];
    return [[x-d,y-d],[x+d,y-d],[x+d,y+d],[x-d,y+d],[x-d,y-d]];
  }
  // для 2 точек — прямоугольник вдоль отрезка
  const ring = coords.map(c => c.slice());
  ring.push(ring[0]);
  return ring;
}

// Построение синтетической коллекции "деловые районы" из зданий.
// kind: 'bizFormed' | 'bizForming' — отбираем районы нужного класса.
function buildSynthGeoJSON(kind) {
  if (kind !== 'bizFormed' && kind !== 'bizForming') {
    return { type: 'FeatureCollection', features: [] };
  }
  const groups = {};
  for (const b of buildingsData) {
    const name = b.biz;
    if (!name || !isFinite(b.lat) || !isFinite(b.lng)) continue;
    if (bizClassOf(name) !== kind) continue;
    (groups[name] ||= []).push([b.lng, b.lat]);
  }
  const features = [];
  for (const [name, pts] of Object.entries(groups)) {
    let ring;
    const hull = convexHull(pts);
    if (hull.length >= 3) { ring = hull.slice(); ring.push(ring[0]); }
    else ring = bufferRing(hull, 0.0035);
    features.push({
      type: 'Feature',
      properties: { name },
      geometry: { type: 'Polygon', coordinates: [ring] }
    });
  }
  return { type: 'FeatureCollection', features };
}

//  ВСТРОЕННЫЕ ДАННЫЕ (до загрузки файла)

function getBuiltinStats(key, nameField, feature) {
  const name = feature.properties[nameField];
  if (key === 'mo') {
    const v = feature.properties[BUILTIN_MO_PRICE_FIELD];
    if (v != null) return { wavg: v, avg: v, volume: null, count: null };
  }
  if (key === 'zones') return BUILTIN_ZONE_DATA[feature.properties.Zone] || null;
  if (key === 'biz') return BUILTIN_BIZ_DATA[name] || null;
  return null;
}

// ============================================================
//  POINT-IN-POLYGON (ray-casting, без зависимостей)
// ============================================================
function pipRing(ring, x, y) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const [xi, yi] = ring[i], [xj, yj] = ring[j];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi))
      inside = !inside;
  }
  return inside;
}
function pointInFeature(lng, lat, feature) {
  const geom = feature.geometry;
  const polys = geom.type === 'Polygon' ? [geom.coordinates]
               : geom.type === 'MultiPolygon' ? geom.coordinates : [];
  for (const poly of polys) {
    if (!pipRing(poly[0], lng, lat)) continue;
    let inHole = false;
    for (let h = 1; h < poly.length; h++) {
      if (pipRing(poly[h], lng, lat)) { inHole = true; break; }
    }
    if (!inHole) return true;
  }
  return false;
}

function computeStats(layerKey, geojson, blds) {
  const cfg = LAYER_CFG[layerKey];
  const data = blds || buildingsData;
  const result = {};
  for (const f of geojson.features) {
    const name = f.properties[cfg.nameField];
    result[name] = { sumPriceArea: 0, sumArea: 0, sumPrice: 0, count: 0, validCount: 0, lots: 0 };
  }
  const add = (name, area, price, lots) => {
    if (!(name in result)) return;
    if (isFinite(area) && isFinite(price) && area > 0) {
      result[name].sumPriceArea += price * area;
      result[name].sumArea += area;
      result[name].sumPrice += price;
      result[name].validCount += 1;
    }
    result[name].count += 1;
    result[name].lots += (lots || 0);
  };
  for (const b of data) {
    const area = b.volume, price = b.price, lots = b.lots || 0;
    if (cfg.groupBy) {
      // группировка по атрибуту здания (для деловых районов)
      const name = b[cfg.groupBy];
      if (name) add(name, area, price, lots);
    } else {
      // point-in-polygon по реальным полигонам
      if (!isFinite(b.lat) || !isFinite(b.lng)) continue;
      for (const f of geojson.features) {
        if (pointInFeature(b.lng, b.lat, f)) {
          add(f.properties[cfg.nameField], area, price, lots);
          break;
        }
      }
    }
  }
  const out = {};
  for (const [name, s] of Object.entries(result)) {
    if (s.count === 0) { out[name] = null; continue; }
    out[name] = {
      wavg:   s.sumArea > 0    ? s.sumPriceArea / s.sumArea : null,
      avg:    s.validCount > 0 ? s.sumPrice / s.validCount : null,
      volume: s.sumArea,
      count:  s.count,
      lots:   s.lots,
    };
  }
  return out;
}

async function renderChoropleth() {
  if (choroplethLayer) map.removeLayer(choroplethLayer);

  const key = activeLayerKey;
  const cfg = LAYER_CFG[key];

  // Для деловых районов геометрия пока некорректна — показываем сводную
  // таблицу вместо полигонов (цифры считаются по атрибуту, не по форме).
  if (NO_GEOMETRY.has(key)) {
    renderStatsTable(key);
    document.getElementById('legend').style.display = 'none';
    return;
  }
  document.getElementById('legend').style.display = '';
  hideStatsTable();

  const gj = await fetchGeoJSON(key);

  // Собираем значения метрики для шкалы
  const vals = gj.features.map(f => {
    const name = f.properties[cfg.nameField];
    if (dataLoaded && computed[key]) {
      return computed[key][name]?.[currentMetric] ?? null;
    }
    const s = getBuiltinStats(key, cfg.nameField, f);
    return s?.[currentMetric] ?? null;
  });
  const scale = makeColorScale(vals);
  updateLegend(scale);

  choroplethLayer = L.geoJSON(gj, {
    style: f => {
      const name = f.properties[cfg.nameField];
      let val = null;
      if (dataLoaded && computed[key]) {
        val = computed[key][name]?.[currentMetric] ?? null;
      } else {
        const s = getBuiltinStats(key, cfg.nameField, f);
        val = s?.[currentMetric] ?? null;
      }
      const color = val != null ? scale.fn(val) : '#e0e0e0';
      return {
        fillColor: color,
        fillOpacity: val != null ? 0.75 : 0.3,
        color: '#888', weight: 0.8, opacity: 0.8
      };
    },
    onEachFeature: (f, layer) => {
      const name = f.properties[cfg.nameField];
      let stats = null;
      if (dataLoaded && computed[key]) stats = computed[key][name];
      else stats = getBuiltinStats(key, cfg.nameField, f);

      const rows = [
        ['Объектов, шт.',          stats?.count  != null ? fmt(Math.round(stats.count)) : '—'],
        ['Объём, кв.м',            stats?.volume != null ? fmt(Math.round(stats.volume)) : '—'],
        ['Ср. цена, руб/кв.м',     stats?.avg    != null ? fmt(Math.round(stats.avg)) : '—'],
        ['Ср. взв. цена, руб/кв.м',stats?.wavg   != null ? fmt(Math.round(stats.wavg)) : '—'],
      ];
      const html = `<b>${displayName(key, name)}</b><br>${rows.map(([l,v]) =>
        `<div class="prow"><span class="plabel">${l}</span><span class="pval">${v}</span></div>`
      ).join('')}`;
      layer.bindPopup(html);
      layer.on('mouseover', function() { this.setStyle({ weight: 2, color: '#333' }); });
      layer.on('mouseout',  function() { if(choroplethLayer) choroplethLayer.resetStyle(this); });
    }
  }).addTo(map);

  // поднять границы и точки поверх заливки
  Object.values(overlayLayers).forEach(l => { if (map.hasLayer(l)) l.bringToFront(); });
  if (buildingsLayer && map.hasLayer(buildingsLayer)) {
    buildingsLayer.eachLayer(m => m.bringToFront && m.bringToFront());
  }
}

// ============================================================
//  ПАРСИНГ CSV
// ============================================================
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = lines[0].split(/[,;\t]/).map(h => h.trim().toLowerCase().replace(/^["']|["']$/g,''));

  // Попытка найти нужные колонки
  const findCol = (...variants) => headers.findIndex(h => variants.some(v => h.includes(v)));
  const iLat   = findCol('lat','широт','latitude','y');
  const iLng   = findCol('lon','lng','долгот','longitude','x');
  const iArea  = findCol('area','площадь','кв','sqm','m2');
  const iPrice = findCol('price','цена','руб','стоимость');

  if (iLat < 0 || iLng < 0) throw new Error(`Не найдены колонки координат.\nЗаголовки: ${headers.join(', ')}`);
  if (iArea < 0) throw new Error(`Не найдена колонка площади.\nЗаголовки: ${headers.join(', ')}`);
  if (iPrice < 0) throw new Error(`Не найдена колонка цены.\nЗаголовки: ${headers.join(', ')}`);

  const pts = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(/[,;\t]/).map(c => c.trim().replace(/^["']|["']$/g,'').replace(',','.'));
    const lat   = parseFloat(cols[iLat]);
    const lng   = parseFloat(cols[iLng]);
    const area  = parseFloat(cols[iArea]);
    const price = parseFloat(cols[iPrice]);
    if (!isFinite(lat) || !isFinite(lng) || !isFinite(area) || !isFinite(price)) continue;
    pts.push({ lat, lng, area, price });
  }
  return pts;
}

function parseGeoJSON(text) {
  const data = JSON.parse(text);
  const pts = [];
  for (const f of (data.features || [])) {
    const [lng, lat] = f.geometry.coordinates;
    const p = f.properties;
    const area  = p.area  || p.площадь || p.sqm  || p.m2    || p['кв.м'] || 0;
    const price = p.price || p.цена    || p['руб/кв.м'] || p.price_sqm || 0;
    if (!isFinite(lat) || !isFinite(lng) || !area || !price) continue;
    pts.push({ lat, lng, area: parseFloat(area), price: parseFloat(price) });
  }
  return pts;
}

// ============================================================
//  СВОДНАЯ СТАТИСТИКА
// ============================================================
function updateGlobalStats(pts) {
  if (!pts.length) return;
  const valid = pts.filter(p => isFinite(p.area) && isFinite(p.price) && p.area > 0);
  const count = pts.length;
  const totalArea = valid.reduce((s, p) => s + p.area, 0);
  const avgPrice = valid.length ? valid.reduce((s, p) => s + p.price, 0) / valid.length : NaN;
  const wavgPrice = totalArea ? valid.reduce((s, p) => s + p.price * p.area, 0) / totalArea : NaN;
  document.getElementById('statCount').textContent = fmt(count);
  document.getElementById('statAvgPrice').textContent = fmt(Math.round(avgPrice));
  document.getElementById('statWAvgPrice').textContent = fmt(Math.round(wavgPrice));
  document.getElementById('statVolume').textContent = fmt(Math.round(totalArea));
  document.getElementById('fileStats').style.display = 'grid';
}

// ============================================================
//  ФОРМАТИРОВАНИЕ
// ============================================================
function fmt(n) {
  if (n == null || !isFinite(n)) return '—';
  return n.toLocaleString('ru-RU');
}
function fmtShort(n) {
  if (!isFinite(n)) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'М';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'К';
  return Math.round(n).toLocaleString('ru-RU');
}

  'A': '#1d4ed8', 'A+': '#1e3a8a', 'Prime': '#4c1d95',
  'B+': '#0891b2', 'B': '#0d9488', 'C': '#65a30d'
};
function buildingColor(cls) { return CLASS_COLORS[cls] || '#6b7280'; }
function buildingRadius(vol) {
  if (!isFinite(vol) || vol <= 0) return 4;
  return Math.max(4, Math.min(18, Math.sqrt(vol) / 12));
}

function renderBuildings() {
  if (buildingsLayer) map.removeLayer(buildingsLayer);
  const clustered = document.getElementById('ovCluster').checked;
  buildingsLayer = clustered
    ? L.markerClusterGroup({
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        disableClusteringAtZoom: 15
      })
    : L.layerGroup();
  buildingsData.forEach((b, idx) => {
    if (!isFinite(b.lat) || !isFinite(b.lng)) return;
    const marker = L.circleMarker([b.lat, b.lng], {
      radius: buildingRadius(b.volume),
      fillColor: buildingColor(b.cls),
      color: '#fff', weight: 1, opacity: 1, fillOpacity: 0.85
    });
    const nLots = (lotsData[b.name] || []).length || (b.lots ?? 0);
    const rows = [
      ['Адрес',        b.address || '—'],
      ['Девелопер',    b.developer || '—'],
      ['Класс',        b.cls || '—'],
      ['Год ввода',    b.year || '—'],
      ['Статус',       b.status || '—'],
      ['В продаже',    b.on_sale || '—'],
      ['GBA, кв.м',    b.gba != null ? fmt(Math.round(b.gba)) : '—'],
      ['GLA, кв.м',    b.gla != null ? fmt(Math.round(b.gla)) : '—'],
      ['Объём на продажу, кв.м', b.volume != null ? fmt(Math.round(b.volume)) : '—'],
      ['Цена с НДС, руб/кв.м',   b.price  != null ? fmt(Math.round(b.price)) : '—'],
      ['Лотов, шт.',   fmt(nLots)],
      ['Зона',         b.geoZone ? displayName('zones', b.geoZone) : '—'],
      ['Субрынок',     b.geoSubmarket || '—'],
      ['Деловой р-н (сформир.)',  b.geoBizFormed || '—'],
      ['Деловой р-н (формир.)',   b.geoBizForming || '—'],
    ];
    const lotsBtn = nLots > 0
      ? `<button class="popup-lots-btn" onclick="openLotsModal(${idx})">📋 Показать лоты (${nLots})</button>`
      : '';
    const anaBtn = `<button class="popup-lots-btn" style="background:#7c3aed;margin-left:4px;" onclick="openBuildingAnalytics(${idx})">📊 Аналитика</button>`;
    const html = `<b>${b.name || 'Без названия'}</b>` +
      rows.map(([l,v]) => `<div class="prow"><span class="plabel">${l}</span><span class="pval">${v}</span></div>`).join('') +
      `<div style="margin-top:8px;">${lotsBtn}${anaBtn}</div>`;
    marker.bindPopup(html, { maxHeight: 340 });
    marker.bindTooltip(b.name || '', { direction: 'top' });
    buildingsLayer.addLayer(marker);
  });
  if (document.getElementById('ovBuildings').checked) buildingsLayer.addTo(map);
  renderBuildingsLegend();
}

// Легенда зданий: классы (цвет) + объём (размер)
function renderBuildingsLegend() {
  const el = document.getElementById('buildingsLegend');
  if (!document.getElementById('ovBuildings').checked || !buildingsData.length) {
    el.style.display = 'none';
    return;
  }
  // классы, реально присутствующие в данных, в желаемом порядке
  const order = ['Prime', 'A+', 'A', 'B+', 'B', 'C'];
  const present = order.filter(c => buildingsData.some(b => b.cls === c));
  const others = [...new Set(buildingsData.map(b => b.cls).filter(c => c && !order.includes(c)))];
  const classes = [...present, ...others];

  const colorRows = classes.map(c => {
    const d = 14;
    return `<div class="bl-item">
      <span class="bl-dot" style="width:${d}px;height:${d}px;background:${buildingColor(c)}"></span>
      <span>Класс ${c}</span></div>`;
  }).join('');

  el.innerHTML = `<h4>Здания — класс</h4>${colorRows}`;
  el.style.display = 'block';
}

async function loadBuildings() {
  const status = document.getElementById('fileStatus');
  try {
    const resp = await fetch(currentQuarter.file);
    const data = await resp.json();
    buildingsData = data;
    // лоты (для таблицы в попапе здания)
    lotsData = {};
    if (currentQuarter.lots) {
      try { lotsData = await (await fetch(currentQuarter.lots)).json(); } catch(e) { lotsData = {}; }
    }
    buildingPoints = data.map(b => ({
      lat: b.lat, lng: b.lng,
      area: b.volume, price: b.price
    }));
    dataLoaded = true;
    status.textContent = `✓ ${currentQuarter.label}: ${data.length} зданий`;
    status.style.color = '#16a34a';
    updateGlobalStats(buildingPoints);
    await recomputeAll();
    assignGeo();
  } catch(e) {
    status.textContent = '✗ Не удалось загрузить данные';
    status.style.color = '#dc2626';
  }
}

// Назначение зоны/субрынка/делового района по геолокации (point-in-polygon).
// Приоритет — попадание в полигон, а не атрибут из таблицы.
function assignGeo() {
  const cfgs = [
    ['geoZone',       'zones',      'name'],
    ['geoSubmarket',  'submarkets', 'name'],
    ['geoBizFormed',  'bizFormed',  'name'],
    ['geoBizForming', 'bizForming', 'district'],
  ];
  for (const b of buildingsData) {
    for (const [prop, key, field] of cfgs) {
      b[prop] = '';
      const fc = geojsonCache[key];
      if (!fc || !isFinite(b.lat) || !isFinite(b.lng)) continue;
      for (const f of fc.features) {
        if (pointInFeature(b.lng, b.lat, f)) { b[prop] = f.properties[field] || ''; break; }
      }
    }
  }
}

const TRANSLIT = {
  'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z','и':'i','й':'y',
  'к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f',
  'х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'shch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
};
function translit(s) {
  return (s || '').toLowerCase().split('').map(c => TRANSLIT[c] ?? c).join('')
    .replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'export';
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

  const inside = buildingsData.filter(b =>
    isFinite(b.lat) && isFinite(b.lng) &&
    polys.some(p => pointInFeature(b.lng, b.lat, p)));

});

    ['Средневзвешенная цена, руб/кв.м', wavg != null ? Math.round(wavg) : '—'],
  ];

  bizFormed:'Дел. районы (сформир.)', bizForming:'Дел. районы (формир.)' };
const METRIC_NAMES = { wavg:'Ср. взв. цена, руб/кв.м', avg:'Ср. цена, руб/кв.м',
  volume:'Объём, кв.м', count:'Кол-во объектов', price:'Цена здания, руб/кв.м', lots:'Лотов, шт.' };
const CHART_COLORS = ['#7c3aed','#2563eb','#0891b2','#16a34a','#ca8a04','#dc2626','#db2777',
  '#0d9488','#65a30d','#9333ea','#ea580c','#0284c7','#4d7c0f','#be123c','#7c2d12','#1e3a8a','#831843'];

function divDisp(layer, name) {
  if (layer === 'zones') return ZONE_NAMES[name] || name;
  return name;
}
function divVal(qid, layer, name, metric) {

function fmtNum(n) { return (n==null||!isFinite(n)) ? '' : Math.round(n); }

// Грубая латиница→кириллица для поиска (Upside → апсайд и т.п.)
const LAT2CYR = [
  ['shch','щ'],['sch','щ'],['kh','х'],['ph','ф'],['ts','ц'],['ch','ч'],['sh','ш'],
  ['yo','ё'],['yu','ю'],['ya','я'],['zh','ж'],['ay','ай'],['ai','ай'],['ey','эй'],['ee','и'],
  ['ou','у'],['oo','у'],['a','а'],['b','б'],['c','к'],['d','д'],['e','е'],['f','ф'],['g','г'],
  ['h','х'],['i','и'],['j','дж'],['k','к'],['l','л'],['m','м'],['n','н'],['o','о'],['p','п'],
  ['q','к'],['r','р'],['s','с'],['t','т'],['u','у'],['v','в'],['w','в'],['x','кс'],['y','й'],['z','з']
];
function latToCyr(s) {
  s = (s || '').toLowerCase(); let out = '';
  for (let i = 0; i < s.length;) {
    let m = null;
    for (const [lat, cyr] of LAT2CYR) { if (s.startsWith(lat, i)) { m = [lat, cyr]; break; } }
    if (m) { out += m[1]; i += m[0].length; } else { out += s[i]; i++; }
  }
  return out;
}
// Фонетические синонимы (английское произношение латинских названий).
// Можно дополнять по мере необходимости.
const NAME_SYNONYMS = {
  'upside':'апсайд', 'icity':'айсити', 'air':'эйр эйр', 'ahead':'эхэд эхед',
  'mount':'маунт', 'bell':'белл', 'plain':'плейн', ' space':'спейс',
  'tower':'тауэр', 'park':'парк', 'plaza':'плаза', 'hub':'хаб', 'city':'сити'
};
function buildingSearchKey(name) {
  const n = (name || '').toLowerCase();
  let syn = '';
  for (const [lat, cyr] of Object.entries(NAME_SYNONYMS)) if (n.includes(lat)) syn += ' ' + cyr;
  return [n, translit(n), latToCyr(n), syn].join(' ');
}

// единый список зданий по всем кварталам (по id, каноническое имя)
let dynBuildingList = [];
function buildDynBuildingList() {
  const seen = new Map();
  for (const q of QUARTERS) {
    for (const b of (allBuildings[q.id] || [])) {
      if (b.id == null) continue;
      if (!seen.has(b.id)) seen.set(b.id, { id: b.id, name: b.name, key: buildingSearchKey(b.name) });
    }
  }
  dynBuildingList = [...seen.values()].sort((a,b)=>(a.name||'').localeCompare(b.name||'','ru'));
}
function fillDynBuildingSelect(query, keepId) {
  const sel = document.getElementById('dynBuilding');
  let q = (query || '').trim().toLowerCase();
  const variants = q ? [q, translit(q), latToCyr(q)] : [];
  const list = !q ? dynBuildingList
    : dynBuildingList.filter(b => variants.some(v => b.key.includes(v)));
  sel.innerHTML = list.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  if (keepId != null && list.some(b=>String(b.id)===String(keepId))) sel.value = keepId;
}

    const layer = document.getElementById('dynDivision').value;
    // имена с данными хотя бы в одном квартале
    const names = new Set();
    qs.forEach(q => Object.entries(allStats[q.id]?.[layer]||{}).forEach(([n,v])=>{ if(v&&v.count>0) names.add(n); }));
    [...names].forEach((n,i)=>{
      datasets.push({ label: divDisp(layer,n),
        data: qs.map(q=>{ const v=divVal(q.id,layer,n,metric); return v==null?null:Math.round(v); }),
        borderColor: CHART_COLORS[i%CHART_COLORS.length], backgroundColor:'transparent', tension:0.2, spanGaps:true });
    });
  } else {
    const id = document.getElementById('dynBuilding').value;
    const name = (buildById[id] && Object.values(buildById[id])[0]?.name) || 'Здание';
    datasets.push({ label: name,
      data: qs.map(q=>{ const v=bldVal(buildById[id]?.[q.id], metric); return v==null?null:Math.round(v); }),
      borderColor: CHART_COLORS[0], backgroundColor:'rgba(124,58,237,0.1)', tension:0.2, spanGaps:true, fill:true });
  }
  if (dynChart) dynChart.destroy();
  dynChart = new Chart(document.getElementById('dynChart'), {
    type:'line', data:{ labels, datasets },
    options:{ responsive:true, plugins:{ legend:{ position:'bottom', labels:{ boxWidth:12, font:{size:11} } },
      title:{ display:true, text:METRIC_NAMES[metric] } }, scales:{ y:{ beginAtZero:false } } }
  });
}
document.getElementById('openDynamics').addEventListener('click', openDynamics);
document.getElementById('dynClose').addEventListener('click', ()=>document.getElementById('dynModalBg').classList.remove('open'));
document.getElementById('dynModalBg').addEventListener('click', e=>{ if(e.target.id==='dynModalBg') e.currentTarget.classList.remove('open'); });
['dynLevel','dynDivision','dynBuilding','dynMetric'].forEach(id=>
  document.getElementById(id).addEventListener('change', renderDynamics));
document.getElementById('dynDownload').addEventListener('click', ()=>{
  if (!dynChart) return;
  const qs = quartersChrono();
  const rows = dynChart.data.datasets.map(ds=>{
    const row = { 'Серия': ds.label };
    qs.forEach((q,i)=> row[q.label] = ds.data[i]);
    return row;
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Динамика');
  XLSX.writeFile(wb, `dynamika_${document.getElementById('dynMetric').value}.xlsx`);
});

// --- Сравнение ---
function fillQuarterSelect(sel, def) {
  sel.innerHTML = QUARTERS.map(q=>`<option value="${q.id}">${q.label}</option>`).join('');
  sel.value = def;
}
async function openCompare() {
  await precomputeAll();
  const qs = quartersChrono();
  fillQuarterSelect(document.getElementById('cmpFrom'), qs[0].id);
  fillQuarterSelect(document.getElementById('cmpTo'), qs[qs.length-1].id);
  document.getElementById('cmpModalBg').classList.add('open');
  renderCompare();
}
let cmpRows = [];
function renderCompare() {
  const from = document.getElementById('cmpFrom').value;
  const to = document.getElementById('cmpTo').value;
  const level = document.getElementById('cmpLevel').value;
  const metric = document.getElementById('cmpMetric').value;
  const rows = [];
  if (level === 'building') {
    const ids = new Set([...Object.keys(buildById)]);
    ids.forEach(id=>{
      const bF = buildById[id]?.[from], bT = buildById[id]?.[to];
      if (!bF && !bT) return;
      const name = (bT||bF).name;
      const was = bldVal(bF, metric==='count'?'count':(metric==='volume'?'volume':'price'));
      const now = bldVal(bT, metric==='count'?'count':(metric==='volume'?'volume':'price'));
      rows.push({ name, was, now });
    });
  } else {
    const names = new Set();
    [from,to].forEach(q=>Object.entries(allStats[q]?.[level]||{}).forEach(([n,v])=>{ if(v) names.add(n); }));
    names.forEach(n=>{
      rows.push({ name: divDisp(level,n), was: divVal(from,level,n,metric), now: divVal(to,level,n,metric) });
    });
  }
  rows.forEach(r=>{
    r.delta = (r.was!=null && r.now!=null) ? r.now-r.was : null;
    r.pct = (r.was) ? (r.now-r.was)/r.was*100 : null;
  });
  rows.sort((a,b)=>(Math.abs(b.pct||0)-Math.abs(a.pct||0)));
  cmpRows = rows;
  const fLbl = QUARTERS.find(q=>q.id===from)?.label, tLbl = QUARTERS.find(q=>q.id===to)?.label;
  const head = `<tr><th>Объект</th><th>${fLbl}</th><th>${tLbl}</th><th>Δ абс.</th><th>Δ %</th></tr>`;
  const body = rows.map(r=>{
    const cls = r.delta>0?'cmp-up':(r.delta<0?'cmp-down':'');
    return `<tr><td>${r.name}</td><td>${fmt(fmtNum(r.was))}</td><td>${fmt(fmtNum(r.now))}</td>
      <td class="${cls}">${r.delta!=null?(r.delta>0?'+':'')+fmt(Math.round(r.delta)):'—'}</td>
      <td class="${cls}">${r.pct!=null?(r.pct>0?'+':'')+r.pct.toFixed(1)+'%':'—'}</td></tr>`;
  }).join('');
  document.getElementById('cmpBody').innerHTML =
    `<table class="cmp-table"><thead>${head}</thead><tbody>${body}</tbody></table>`;
}
document.getElementById('openCompare').addEventListener('click', openCompare);
document.getElementById('cmpClose').addEventListener('click', ()=>document.getElementById('cmpModalBg').classList.remove('open'));
document.getElementById('cmpModalBg').addEventListener('click', e=>{ if(e.target.id==='cmpModalBg') e.currentTarget.classList.remove('open'); });
['cmpFrom','cmpTo','cmpLevel','cmpMetric'].forEach(id=>
  document.getElementById(id).addEventListener('change', renderCompare));
document.getElementById('cmpDownload').addEventListener('click', ()=>{
  const from = document.getElementById('cmpFrom').value, to = document.getElementById('cmpTo').value;
  const fLbl = QUARTERS.find(q=>q.id===from)?.label, tLbl = QUARTERS.find(q=>q.id===to)?.label;
  const rows = cmpRows.map(r=>({ 'Объект':r.name, [fLbl]:fmtNum(r.was), [tLbl]:fmtNum(r.now),
    'Δ абс.': r.delta!=null?Math.round(r.delta):'', 'Δ %': r.pct!=null?+r.pct.toFixed(1):'' }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Сравнение');
  XLSX.writeFile(wb, `sravnenie_${from}_${to}_${document.getElementById('cmpMetric').value}.xlsx`);
});

// Подложка
document.querySelectorAll('input[name="basemap"]').forEach(r => {
  r.addEventListener('change', function() {
    Object.values(basemaps).forEach(l => map.removeLayer(l));
    basemaps[this.value].addTo(map);
  });
});
