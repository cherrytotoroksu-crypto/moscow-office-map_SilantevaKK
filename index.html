<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Офисный рынок Москвы</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; }
    #map { width: 100vw; height: 100vh; }

    .panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      padding: 12px 16px;
      width: 220px;
      font-size: 13px;
    }
    .panel h3 {
      font-size: 11px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 10px 0 6px;
    }
    .panel h3:first-child { margin-top: 0; }
    .panel hr { border: none; border-top: 1px solid #eee; margin: 8px 0; }

    .radio-row, .check-row {
      display: flex; align-items: center; gap: 7px;
      margin: 3px 0; cursor: pointer; color: #333;
    }
    .radio-row input, .check-row input { cursor: pointer; }

    select {
      width: 100%; padding: 4px 6px;
      border: 1px solid #ddd; border-radius: 4px;
      font-size: 12px; margin-top: 2px; cursor: pointer;
    }

    /* Кнопка загрузки */
    .upload-btn {
      display: block; width: 100%; margin-top: 6px;
      padding: 7px; background: #3b82f6; color: white;
      border: none; border-radius: 5px; font-size: 12px;
      cursor: pointer; text-align: center;
    }
    .upload-btn:hover { background: #2563eb; }
    #fileStatus {
      margin-top: 5px; font-size: 11px; color: #555;
      min-height: 16px;
    }
    .stat-row {
      display: flex; justify-content: space-between;
      font-size: 11px; margin: 2px 0;
      color: #444;
    }
    .stat-row span:last-child { font-weight: 600; color: #111; }

    /* Легенда */
    .legend {
      position: absolute;
      bottom: 30px; left: 10px;
      z-index: 1000;
      background: white; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      padding: 12px 16px; font-size: 12px; min-width: 190px;
    }
    .legend h4 {
      font-size: 11px; font-weight: 700; color: #666;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .legend-gradient {
      height: 12px; border-radius: 3px;
      background: linear-gradient(to right, #ffffcc, #fd8d3c, #800026);
    }
    .legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #666; margin: 3px 0 8px; }
    .legend-item { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
    .lswatch { width: 22px; height: 12px; border-radius: 2px; flex-shrink: 0; }
    .no-data-row { display: flex; align-items: center; gap: 7px; }

    /* Таблица деловых районов (когда геометрия скрыта) */
    .stats-table {
      position: absolute;
      bottom: 30px; left: 10px;
      z-index: 1000;
      background: white; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      padding: 12px 14px; font-size: 12px;
      max-width: 360px; display: none;
    }
    .stats-table h4 { font-size: 12px; font-weight: 700; color: #333; margin-bottom: 8px; }
    .stats-table .note { font-size: 10px; color: #999; margin-bottom: 8px; }
    .stats-table table { border-collapse: collapse; width: 100%; }
    .stats-table th, .stats-table td { padding: 3px 8px; text-align: right; white-space: nowrap; }
    .stats-table th { color: #888; font-weight: 600; border-bottom: 1px solid #ddd; font-size: 10px; text-transform: uppercase; }
    .stats-table td:first-child, .stats-table th:first-child { text-align: left; }
    .stats-table tr:not(:last-child) td { border-bottom: 1px solid #f3f3f3; }
    .stats-table td.hl { font-weight: 700; color: #bd0026; }

    /* Popup */
    .leaflet-popup-content { font-size: 13px; min-width: 200px; }
    .leaflet-popup-content b { font-size: 14px; }
    .prow { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #f0f0f0; gap: 8px; }
    .prow:last-child { border-bottom: none; }
    .plabel { color: #888; font-size: 11px; white-space: nowrap; }
    .pval { font-weight: 600; color: #222; text-align: right; }
  </style>
</head>
<body>
<div id="map"></div>

<!-- Правая панель -->
<div class="panel">
  <h3>Данные (Свод, март 2026)</h3>
  <div id="fileStatus">Загрузка…</div>
  <div id="fileStats" style="display:none; margin-top:6px; padding-top:6px; border-top:1px solid #eee;">
    <div class="stat-row"><span>Объектов:</span><span id="statCount">—</span></div>
    <div class="stat-row"><span>Ср. цена, руб/кв.м:</span><span id="statAvgPrice">—</span></div>
    <div class="stat-row"><span>Ср. взв. цена:</span><span id="statWAvgPrice">—</span></div>
    <div class="stat-row"><span>Объём, кв.м:</span><span id="statVolume">—</span></div>
  </div>
  <label class="upload-btn" for="fileInput" style="margin-top:8px;">&#8593; Загрузить свой CSV / GeoJSON</label>
  <input type="file" id="fileInput" accept=".csv,.geojson,.json" style="display:none">

  <hr>
  <h3>Деление для расчёта</h3>
  <label class="radio-row"><input type="radio" name="activeLayer" value="mo" checked> Адм. границы Москвы</label>
  <label class="radio-row"><input type="radio" name="activeLayer" value="ao"> Автономные округа</label>
  <label class="radio-row"><input type="radio" name="activeLayer" value="zones"> Зоны (кольца)</label>
  <label class="radio-row"><input type="radio" name="activeLayer" value="submarkets"> Субрынки</label>
  <label class="radio-row"><input type="radio" name="activeLayer" value="bizFormed"> Деловые районы — сформированные</label>
  <label class="radio-row"><input type="radio" name="activeLayer" value="bizForming"> Деловые районы — формирующиеся</label>

  <hr>
  <h3>Показатель</h3>
  <select id="metricSelect">
    <option value="wavg">Ср. взвешенная цена (руб/кв.м)</option>
    <option value="avg">Ср. цена (руб/кв.м)</option>
    <option value="volume">Объём предложения (кв.м)</option>
    <option value="count">Кол-во объектов (шт.)</option>
  </select>

  <hr>
  <h3>Объекты (здания)</h3>
  <label class="check-row"><input type="checkbox" id="ovBuildings" checked> Показать здания</label>

  <hr>
  <h3>Доп. границы</h3>
  <label class="check-row"><input type="checkbox" id="ovMo" checked> Адм. границы</label>
  <label class="check-row"><input type="checkbox" id="ovAo"> Округа (АО)</label>
  <label class="check-row"><input type="checkbox" id="ovZones"> Зоны (кольца)</label>
  <label class="check-row"><input type="checkbox" id="ovSub"> Субрынки</label>

  <hr>
  <h3>Подложка</h3>
  <label class="radio-row"><input type="radio" name="basemap" value="carto" checked> Базовая карта</label>
  <label class="radio-row"><input type="radio" name="basemap" value="osm"> OSM</label>
  <label class="radio-row"><input type="radio" name="basemap" value="satellite"> Спутник</label>
</div>

<!-- Сводная таблица деловых районов (геометрия временно скрыта) -->
<div class="stats-table" id="statsTable"></div>

<!-- Легенда -->
<div class="legend" id="legend">
  <h4 id="legendTitle">Ср. взв. цена, руб/кв.м</h4>
  <div class="legend-gradient" id="legendGradient"></div>
  <div class="legend-labels"><span id="legendMin">мин</span><span id="legendMax">макс</span></div>
  <div class="no-data-row">
    <div class="lswatch" style="background:#e0e0e0; border:1px solid #bbb;"></div>
    <span>Нет данных</span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============================================================
//  КОНФИГ СЛОЁВ
// ============================================================
const LAYER_CFG = {
  mo:         { file: 'data/mo.geojson',         nameField: 'NAME',    label: 'Адм. границы Москвы' },
  ao:         { file: 'data/ao.geojson',          nameField: 'NAME_AO', label: 'Автономные округа' },
  zones:      { file: 'data/zones.geojson',       nameField: 'name',    label: 'Зоны (кольца)' },
  submarkets: { file: 'data/submarkets.geojson',  nameField: 'name',    label: 'Субрынки' },
  // Деловые районы: полигонов в исходных данных нет — строим выпуклые
  // оболочки из координат зданий, отдельно по сформированным и формирующимся.
  // Статистику считаем по атрибуту "Деловой район" (совпадает с таблицей).
  bizFormed:  { synth: 'bizFormed',  groupBy: 'biz', nameField: 'name', label: 'Деловые районы — сформированные' },
  bizForming: { synth: 'bizForming', groupBy: 'biz', nameField: 'name', label: 'Деловые районы — формирующиеся' },
};

// Классификация деловых районов по таблице "субрынки названия.xlsx".
// Сформированные — устоявшиеся деловые районы; формирующиеся — развивающиеся.
const BIZ_FORMED = new Set([
  'Белорусский', 'Павелецкий', 'Ленинградский', 'Москва-Сити', 'Сити', 'ЦДР'
]);
const BIZ_FORMING = new Set([
  'Большой Сити', 'Ходынка', 'Савеловский', 'Калужский', 'Кутузовский',
  'Новая Москва', 'Северный речной порт', 'Южный речной порт', 'Южный порт'
]);
function bizClassOf(name) {
  if (BIZ_FORMED.has(name)) return 'bizFormed';
  if (BIZ_FORMING.has(name)) return 'bizForming';
  return null;
}

// Встроенные данные (используются когда файл не загружен)
const BUILTIN_ZONE_DATA = {
  'BR-GR':   { wavg: 1347753, avg: 1347753, volume: 1685,   count: 1  },
  'GR-TTR':  { wavg: 766747,  avg: 766747,  volume: 171153, count: 16 },
  'TTR-MKAD':{ wavg: 484406,  avg: 484406,  volume: 952703, count: 65 },
  'BR':      { wavg: 248390,  avg: 248390,  volume: 150445, count: 10 },
};
const BUILTIN_BIZ_DATA = {
  'Москва-Сити': { wavg: 482508, avg: 482508, volume: 218031, count: 17 },
  'Калужский':   { wavg: 425098, avg: 425098, volume: 53642,  count: 4  },
  'Савеловский': { wavg: 604753, avg: 604753, volume: 51725,  count: 7  },
  'Ходынка':     { wavg: 502427, avg: 502427, volume: 151075, count: 6  },
};
const BUILTIN_MO_PRICE_FIELD = 'Средневзвешенная цена за кв. м';

// ============================================================
//  СОСТОЯНИЕ
// ============================================================
let geojsonCache = {};      // key -> raw GeoJSON
let buildingPoints = [];    // [{lat,lng,area,price}, ...] — для расчётов
let buildingsData = [];     // полные записи зданий — для слоя точек
let computed = {};          // activeLayerKey -> { featureName -> {wavg,avg,volume,count} }
let activeLayerKey = 'mo';
let currentMetric = 'wavg';
let dataLoaded = false;

// Слои Leaflet
let choroplethLayer = null;
let buildingsLayer = null;
const overlayLayers = {};   // key -> L.geoJSON

// ============================================================
//  КАРТА
// ============================================================
const map = L.map('map', { zoomControl: true }).setView([55.75, 37.62], 10);

const basemaps = {
  carto: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    { attribution: '&copy; CARTO', subdomains: 'abcd', maxZoom: 19 }),
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '&copy; OpenStreetMap', maxZoom: 19 }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: 'Tiles &copy; Esri', maxZoom: 19 })
};
basemaps.carto.addTo(map);

// ============================================================
//  ЦВЕТА
// ============================================================
function makeColorScale(vals) {
  const sorted = vals.filter(v => v != null && isFinite(v)).sort((a,b) => a-b);
  if (!sorted.length) return { min: 0, max: 1, fn: () => '#e0e0e0' };
  const min = sorted[0], max = sorted[sorted.length - 1];
  // YlOrRd 7 классов
  const stops = [
    [0.00, '#ffffcc'], [0.17, '#ffeda0'], [0.33, '#fed976'],
    [0.50, '#feb24c'], [0.67, '#fd8d3c'], [0.83, '#f03b20'], [1.00, '#bd0026']
  ];
  function hexToRgb(h) {
    const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
    return [r,g,b];
  }
  function lerp(a, b, t) { return Math.round(a + (b-a)*t); }
  function colorAt(t) {
    for (let i = 1; i < stops.length; i++) {
      if (t <= stops[i][0]) {
        const t0 = stops[i-1][0], t1 = stops[i][0];
        const s = (t - t0) / (t1 - t0);
        const [r0,g0,b0] = hexToRgb(stops[i-1][1]);
        const [r1,g1,b1] = hexToRgb(stops[i][1]);
        return `rgb(${lerp(r0,r1,s)},${lerp(g0,g1,s)},${lerp(b0,b1,s)})`;
      }
    }
    return stops[stops.length-1][1];
  }
  return {
    min, max,
    fn: v => v == null ? null : colorAt((v - min) / (max - min || 1))
  };
}

// ============================================================
//  ЗАГРУЗКА ГЕОДАННЫХ
// ============================================================
async function fetchGeoJSON(key) {
  if (geojsonCache[key]) return geojsonCache[key];
  const cfg = LAYER_CFG[key];
  if (cfg.synth) {
    // синтетический слой строится из данных зданий позже
    const data = buildSynthGeoJSON(cfg.synth);
    geojsonCache[key] = data;
    return data;
  }
  const resp = await fetch(cfg.file);
  let data = await resp.json();
  if (cfg.filter) data = { ...data, features: data.features.filter(cfg.filter) };
  geojsonCache[key] = data;
  return data;
}

async function preloadAll() {
  // грузим только файловые слои; синтетические — после загрузки зданий
  await Promise.all(Object.keys(LAYER_CFG)
    .filter(k => !LAYER_CFG[k].synth).map(fetchGeoJSON));
}

// ============================================================
//  ВЫПУКЛАЯ ОБОЛОЧКА (Andrew's monotone chain)
// ============================================================
function convexHull(points) {
  const pts = points.slice().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
  if (pts.length < 3) return pts;
  const cross = (o, a, b) => (a[0]-o[0])*(b[1]-o[1]) - (a[1]-o[1])*(b[0]-o[0]);
  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = pts.length-1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
    upper.push(p);
  }
  lower.pop(); upper.pop();
  return lower.concat(upper);
}

// Небольшой буфер (квадрат) вокруг точки/линии для вырожденных оболочек
function bufferRing(coords, d) {
  if (coords.length === 1) {
    const [x, y] = coords[0];
    return [[x-d,y-d],[x+d,y-d],[x+d,y+d],[x-d,y+d],[x-d,y-d]];
  }
  // для 2 точек — прямоугольник вдоль отрезка
  const ring = coords.map(c => c.slice());
  ring.push(ring[0]);
  return ring;
}

// Построение синтетической коллекции "деловые районы" из зданий.
// kind: 'bizFormed' | 'bizForming' — отбираем районы нужного класса.
function buildSynthGeoJSON(kind) {
  if (kind !== 'bizFormed' && kind !== 'bizForming') {
    return { type: 'FeatureCollection', features: [] };
  }
  const groups = {};
  for (const b of buildingsData) {
    const name = b.biz;
    if (!name || !isFinite(b.lat) || !isFinite(b.lng)) continue;
    if (bizClassOf(name) !== kind) continue;
    (groups[name] ||= []).push([b.lng, b.lat]);
  }
  const features = [];
  for (const [name, pts] of Object.entries(groups)) {
    let ring;
    const hull = convexHull(pts);
    if (hull.length >= 3) { ring = hull.slice(); ring.push(ring[0]); }
    else ring = bufferRing(hull, 0.0035);
    features.push({
      type: 'Feature',
      properties: { name },
      geometry: { type: 'Polygon', coordinates: [ring] }
    });
  }
  return { type: 'FeatureCollection', features };
}

// ============================================================
//  ВСТРОЕННЫЕ ДАННЫЕ (до загрузки файла)
// ============================================================
function getBuiltinStats(key, nameField, feature) {
  const name = feature.properties[nameField];
  if (key === 'mo') {
    const v = feature.properties[BUILTIN_MO_PRICE_FIELD];
    if (v != null) return { wavg: v, avg: v, volume: null, count: null };
  }
  if (key === 'zones') return BUILTIN_ZONE_DATA[feature.properties.Zone] || null;
  if (key === 'biz') return BUILTIN_BIZ_DATA[name] || null;
  return null;
}

// ============================================================
//  POINT-IN-POLYGON (ray-casting, без зависимостей)
// ============================================================
function pipRing(ring, x, y) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const [xi, yi] = ring[i], [xj, yj] = ring[j];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi))
      inside = !inside;
  }
  return inside;
}
function pointInFeature(lng, lat, feature) {
  const geom = feature.geometry;
  const polys = geom.type === 'Polygon' ? [geom.coordinates]
               : geom.type === 'MultiPolygon' ? geom.coordinates : [];
  for (const poly of polys) {
    if (!pipRing(poly[0], lng, lat)) continue;
    let inHole = false;
    for (let h = 1; h < poly.length; h++) {
      if (pipRing(poly[h], lng, lat)) { inHole = true; break; }
    }
    if (!inHole) return true;
  }
  return false;
}

function computeStats(layerKey, geojson) {
  const cfg = LAYER_CFG[layerKey];
  const result = {};
  for (const f of geojson.features) {
    const name = f.properties[cfg.nameField];
    result[name] = { sumPriceArea: 0, sumArea: 0, sumPrice: 0, count: 0, validCount: 0 };
  }
  const add = (name, area, price) => {
    if (!(name in result)) return;
    if (isFinite(area) && isFinite(price) && area > 0) {
      result[name].sumPriceArea += price * area;
      result[name].sumArea += area;
      result[name].sumPrice += price;
      result[name].validCount += 1;
    }
    result[name].count += 1;
  };
  for (const b of buildingsData) {
    const area = b.volume, price = b.price;
    if (cfg.groupBy) {
      // группировка по атрибуту здания (для деловых районов)
      const name = b[cfg.groupBy];
      if (name) add(name, area, price);
    } else {
      // point-in-polygon по реальным полигонам
      if (!isFinite(b.lat) || !isFinite(b.lng)) continue;
      for (const f of geojson.features) {
        if (pointInFeature(b.lng, b.lat, f)) {
          add(f.properties[cfg.nameField], area, price);
          break;
        }
      }
    }
  }
  const out = {};
  for (const [name, s] of Object.entries(result)) {
    if (s.count === 0) { out[name] = null; continue; }
    out[name] = {
      wavg:   s.sumArea > 0    ? s.sumPriceArea / s.sumArea : null,
      avg:    s.validCount > 0 ? s.sumPrice / s.validCount : null,
      volume: s.sumArea,
      count:  s.count,
    };
  }
  return out;
}

async function recomputeAll() {
  computed = {};
  for (const key of Object.keys(LAYER_CFG)) {
    const gj = await fetchGeoJSON(key);
    computed[key] = computeStats(key, gj);
  }
}

// ============================================================
//  РЕНДЕР ХОРОПЛЕТА
// ============================================================
// Слои, у которых геометрия временно скрыта — показываем таблицей
const NO_GEOMETRY = new Set(['bizFormed', 'bizForming']);

function hideStatsTable() {
  document.getElementById('statsTable').style.display = 'none';
}

function renderStatsTable(key) {
  const el = document.getElementById('statsTable');
  const stats = computed[key] || {};
  const rows = Object.entries(stats)
    .filter(([n, v]) => v && v.count > 0)
    .sort((a, b) => (b[1][currentMetric] ?? -1) - (a[1][currentMetric] ?? -1));

  const title = LAYER_CFG[key].label;
  let html = `<h4>${title}</h4>` +
    `<div class="note">Геометрия районов временно скрыта. Цифры — по таблице зданий.</div>` +
    `<table><thead><tr>` +
    `<th>Район</th><th>Объект.</th><th>Объём</th><th>Ср. цена</th><th>Ср.взв.</th>` +
    `</tr></thead><tbody>`;
  for (const [name, v] of rows) {
    const cell = (m, val) => `<td class="${currentMetric === m ? 'hl' : ''}">${val}</td>`;
    html += `<tr><td>${name}</td>` +
      cell('count',  fmt(Math.round(v.count))) +
      cell('volume', fmt(Math.round(v.volume))) +
      cell('avg',    v.avg != null ? fmt(Math.round(v.avg)) : '—') +
      cell('wavg',   v.wavg != null ? fmt(Math.round(v.wavg)) : '—') +
      `</tr>`;
  }
  if (!rows.length) html += `<tr><td colspan="5" style="color:#999">Нет данных</td></tr>`;
  html += `</tbody></table>`;
  el.innerHTML = html;
  el.style.display = 'block';
}

async function renderChoropleth() {
  if (choroplethLayer) map.removeLayer(choroplethLayer);

  const key = activeLayerKey;
  const cfg = LAYER_CFG[key];

  // Для деловых районов геометрия пока некорректна — показываем сводную
  // таблицу вместо полигонов (цифры считаются по атрибуту, не по форме).
  if (NO_GEOMETRY.has(key)) {
    renderStatsTable(key);
    document.getElementById('legend').style.display = 'none';
    return;
  }
  document.getElementById('legend').style.display = '';
  hideStatsTable();

  const gj = await fetchGeoJSON(key);

  // Собираем значения метрики для шкалы
  const vals = gj.features.map(f => {
    const name = f.properties[cfg.nameField];
    if (dataLoaded && computed[key]) {
      return computed[key][name]?.[currentMetric] ?? null;
    }
    const s = getBuiltinStats(key, cfg.nameField, f);
    return s?.[currentMetric] ?? null;
  });
  const scale = makeColorScale(vals);
  updateLegend(scale);

  choroplethLayer = L.geoJSON(gj, {
    style: f => {
      const name = f.properties[cfg.nameField];
      let val = null;
      if (dataLoaded && computed[key]) {
        val = computed[key][name]?.[currentMetric] ?? null;
      } else {
        const s = getBuiltinStats(key, cfg.nameField, f);
        val = s?.[currentMetric] ?? null;
      }
      const color = val != null ? scale.fn(val) : '#e0e0e0';
      return {
        fillColor: color,
        fillOpacity: val != null ? 0.75 : 0.3,
        color: '#888', weight: 0.8, opacity: 0.8
      };
    },
    onEachFeature: (f, layer) => {
      const name = f.properties[cfg.nameField];
      let stats = null;
      if (dataLoaded && computed[key]) stats = computed[key][name];
      else stats = getBuiltinStats(key, cfg.nameField, f);

      const rows = [
        ['Объектов, шт.',      stats?.count  != null ? fmt(Math.round(stats.count)) : '—'],
        ['Объём, кв.м',        stats?.volume != null ? fmt(Math.round(stats.volume)) : '—'],
        ['Ср. цена, руб/кв.м', stats?.avg    != null ? fmt(Math.round(stats.avg)) : '—'],
        ['Ср. взв. цена',      stats?.wavg   != null ? fmt(Math.round(stats.wavg)) : '—'],
      ];
      const html = `<b>${name}</b><br>${rows.map(([l,v]) =>
        `<div class="prow"><span class="plabel">${l}</span><span class="pval">${v}</span></div>`
      ).join('')}`;
      layer.bindPopup(html);
      layer.on('mouseover', function() { this.setStyle({ weight: 2, color: '#333' }); });
      layer.on('mouseout',  function() { if(choroplethLayer) choroplethLayer.resetStyle(this); });
    }
  }).addTo(map);

  // поднять границы и точки поверх заливки
  Object.values(overlayLayers).forEach(l => { if (map.hasLayer(l)) l.bringToFront(); });
  if (buildingsLayer && map.hasLayer(buildingsLayer)) {
    buildingsLayer.eachLayer(m => m.bringToFront && m.bringToFront());
  }
}

// ============================================================
//  ОВЕРЛЕИ (доп. границы)
// ============================================================
const OVERLAY_CFG = [
  { id: 'ovMo',    key: 'mo',         style: { color:'#555',    weight:0.8, dashArray:null,  fillOpacity:0 } },
  { id: 'ovAo',    key: 'ao',         style: { color:'#222',    weight:2,   dashArray:null,  fillOpacity:0 } },
  { id: 'ovZones', key: 'zones',      style: { color:'#8b0000', weight:2,   dashArray:'6 4', fillOpacity:0 } },
  { id: 'ovSub',   key: 'submarkets', style: { color:'#003296', weight:1.5, dashArray:'3 3', fillOpacity:0 } },
];

async function renderOverlays() {
  for (const oc of OVERLAY_CFG) {
    if (overlayLayers[oc.id]) map.removeLayer(overlayLayers[oc.id]);
    const gj = await fetchGeoJSON(oc.key);
    overlayLayers[oc.id] = L.geoJSON(gj, {
      style: oc.style,
      onEachFeature: (f, layer) => {
        const name = f.properties[LAYER_CFG[oc.key].nameField] || '—';
        layer.bindTooltip(name, { sticky: true, className: 'leaflet-tooltip' });
      }
    });
    if (document.getElementById(oc.id).checked) overlayLayers[oc.id].addTo(map);
  }
}

// ============================================================
//  ЛЕГЕНДА
// ============================================================
const METRIC_LABELS = {
  wavg: 'Ср. взв. цена, руб/кв.м',
  avg:  'Ср. цена, руб/кв.м',
  volume: 'Объём предложения, кв.м',
  count: 'Кол-во объектов, шт.',
};

function updateLegend(scale) {
  document.getElementById('legendTitle').textContent = METRIC_LABELS[currentMetric];
  document.getElementById('legendMin').textContent = fmtShort(scale.min);
  document.getElementById('legendMax').textContent = fmtShort(scale.max);
  const gradColors = ['#ffffcc','#fd8d3c','#bd0026'];
  document.getElementById('legendGradient').style.background =
    `linear-gradient(to right, ${gradColors.join(',')})`;
}

// ============================================================
//  ПАРСИНГ CSV
// ============================================================
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = lines[0].split(/[,;\t]/).map(h => h.trim().toLowerCase().replace(/^["']|["']$/g,''));

  // Попытка найти нужные колонки
  const findCol = (...variants) => headers.findIndex(h => variants.some(v => h.includes(v)));
  const iLat   = findCol('lat','широт','latitude','y');
  const iLng   = findCol('lon','lng','долгот','longitude','x');
  const iArea  = findCol('area','площадь','кв','sqm','m2');
  const iPrice = findCol('price','цена','руб','стоимость');

  if (iLat < 0 || iLng < 0) throw new Error(`Не найдены колонки координат.\nЗаголовки: ${headers.join(', ')}`);
  if (iArea < 0) throw new Error(`Не найдена колонка площади.\nЗаголовки: ${headers.join(', ')}`);
  if (iPrice < 0) throw new Error(`Не найдена колонка цены.\nЗаголовки: ${headers.join(', ')}`);

  const pts = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(/[,;\t]/).map(c => c.trim().replace(/^["']|["']$/g,'').replace(',','.'));
    const lat   = parseFloat(cols[iLat]);
    const lng   = parseFloat(cols[iLng]);
    const area  = parseFloat(cols[iArea]);
    const price = parseFloat(cols[iPrice]);
    if (!isFinite(lat) || !isFinite(lng) || !isFinite(area) || !isFinite(price)) continue;
    pts.push({ lat, lng, area, price });
  }
  return pts;
}

function parseGeoJSON(text) {
  const data = JSON.parse(text);
  const pts = [];
  for (const f of (data.features || [])) {
    const [lng, lat] = f.geometry.coordinates;
    const p = f.properties;
    const area  = p.area  || p.площадь || p.sqm  || p.m2    || p['кв.м'] || 0;
    const price = p.price || p.цена    || p['руб/кв.м'] || p.price_sqm || 0;
    if (!isFinite(lat) || !isFinite(lng) || !area || !price) continue;
    pts.push({ lat, lng, area: parseFloat(area), price: parseFloat(price) });
  }
  return pts;
}

// ============================================================
//  СВОДНАЯ СТАТИСТИКА
// ============================================================
function updateGlobalStats(pts) {
  if (!pts.length) return;
  const valid = pts.filter(p => isFinite(p.area) && isFinite(p.price) && p.area > 0);
  const count = pts.length;
  const totalArea = valid.reduce((s, p) => s + p.area, 0);
  const avgPrice = valid.length ? valid.reduce((s, p) => s + p.price, 0) / valid.length : NaN;
  const wavgPrice = totalArea ? valid.reduce((s, p) => s + p.price * p.area, 0) / totalArea : NaN;
  document.getElementById('statCount').textContent = fmt(count);
  document.getElementById('statAvgPrice').textContent = fmt(Math.round(avgPrice));
  document.getElementById('statWAvgPrice').textContent = fmt(Math.round(wavgPrice));
  document.getElementById('statVolume').textContent = fmt(Math.round(totalArea));
  document.getElementById('fileStats').style.display = 'block';
}

// ============================================================
//  ФОРМАТИРОВАНИЕ
// ============================================================
function fmt(n) {
  if (n == null || !isFinite(n)) return '—';
  return n.toLocaleString('ru-RU');
}
function fmtShort(n) {
  if (!isFinite(n)) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'М';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'К';
  return Math.round(n).toLocaleString('ru-RU');
}

// ============================================================
//  СЛОЙ ЗДАНИЙ (точки)
// ============================================================
const CLASS_COLORS = {
  'A': '#1d4ed8', 'A+': '#1e3a8a', 'Prime': '#4c1d95',
  'B+': '#0891b2', 'B': '#0d9488', 'C': '#65a30d'
};
function buildingColor(cls) { return CLASS_COLORS[cls] || '#6b7280'; }
function buildingRadius(vol) {
  if (!isFinite(vol) || vol <= 0) return 4;
  return Math.max(4, Math.min(18, Math.sqrt(vol) / 12));
}

function renderBuildings() {
  if (buildingsLayer) map.removeLayer(buildingsLayer);
  buildingsLayer = L.layerGroup();
  for (const b of buildingsData) {
    if (!isFinite(b.lat) || !isFinite(b.lng)) continue;
    const marker = L.circleMarker([b.lat, b.lng], {
      radius: buildingRadius(b.volume),
      fillColor: buildingColor(b.cls),
      color: '#fff', weight: 1, opacity: 1, fillOpacity: 0.85
    });
    const rows = [
      ['Адрес',        b.address || '—'],
      ['Девелопер',    b.developer || '—'],
      ['Класс',        b.cls || '—'],
      ['Год ввода',    b.year || '—'],
      ['Статус',       b.status || '—'],
      ['В продаже',    b.on_sale || '—'],
      ['GBA, кв.м',    b.gba != null ? fmt(Math.round(b.gba)) : '—'],
      ['GLA, кв.м',    b.gla != null ? fmt(Math.round(b.gla)) : '—'],
      ['Объём на продажу, кв.м', b.volume != null ? fmt(Math.round(b.volume)) : '—'],
      ['Цена с НДС, руб/кв.м',   b.price  != null ? fmt(Math.round(b.price)) : '—'],
      ['Зона',         b.zone || '—'],
      ['Субрынок',     b.submarket || '—'],
      ['Деловой район',b.biz || '—'],
    ];
    const html = `<b>${b.name || 'Без названия'}</b>` +
      rows.map(([l,v]) => `<div class="prow"><span class="plabel">${l}</span><span class="pval">${v}</span></div>`).join('');
    marker.bindPopup(html, { maxHeight: 320 });
    marker.bindTooltip(b.name || '', { direction: 'top' });
    buildingsLayer.addLayer(marker);
  }
  if (document.getElementById('ovBuildings').checked) buildingsLayer.addTo(map);
}

// ============================================================
//  ИНИЦИАЛИЗАЦИЯ
// ============================================================
async function loadBuildings() {
  const status = document.getElementById('fileStatus');
  try {
    const resp = await fetch('data/buildings.json');
    const data = await resp.json();
    buildingsData = data;
    buildingPoints = data.map(b => ({
      lat: b.lat, lng: b.lng,
      area: b.volume, price: b.price
    }));
    delete geojsonCache['bizFormed'];   // пересобрать оболочки деловых районов
    delete geojsonCache['bizForming'];
    dataLoaded = true;
    status.textContent = `✓ ${data.length} зданий`;
    status.style.color = '#16a34a';
    updateGlobalStats(buildingPoints);
    await recomputeAll();
  } catch(e) {
    status.textContent = '✗ Не удалось загрузить данные';
    status.style.color = '#dc2626';
  }
}

async function init() {
  await preloadAll();
  await loadBuildings();
  await renderChoropleth();
  await renderBuildings();
  await renderOverlays();
}
init();

// ============================================================
//  ОБРАБОТЧИКИ СОБЫТИЙ
// ============================================================

// Загрузка файла
document.getElementById('fileInput').addEventListener('change', async function() {
  const file = this.files[0];
  if (!file) return;
  const status = document.getElementById('fileStatus');
  status.textContent = 'Загружаю...';
  try {
    const text = await file.text();
    let pts;
    if (file.name.endsWith('.csv')) {
      pts = parseCSV(text);
    } else {
      pts = parseGeoJSON(text);
    }
    if (!pts.length) throw new Error('Не найдено ни одного корректного объекта');
    buildingPoints = pts;
    buildingsData = pts.map(p => ({
      name: p.name || '', address: p.address || '', developer: p.developer || '',
      cls: p.cls || '', year: p.year || '', status: p.status || '', on_sale: p.on_sale || '',
      gba: p.gba ?? null, gla: p.gla ?? null,
      volume: p.area, price: p.price,
      zone: p.zone || '', submarket: p.submarket || '', biz: p.biz || '',
      lat: p.lat, lng: p.lng
    }));
    delete geojsonCache['bizFormed'];   // пересобрать оболочки деловых районов
    delete geojsonCache['bizForming'];
    dataLoaded = true;
    status.textContent = `✓ ${file.name} (${pts.length} объектов)`;
    updateGlobalStats(pts);
    status.style.color = '#16a34a';
    await recomputeAll();
    await renderChoropleth();
    await renderBuildings();
  } catch(e) {
    status.textContent = '✗ Ошибка: ' + e.message;
    status.style.color = '#dc2626';
  }
});

    renderChoropleth();

});

document.getElementById('ovBuildings').addEventListener('change', function() {
  if (!buildingsLayer) return;
  this.checked ? buildingsLayer.addTo(map) : map.removeLayer(buildingsLayer);

document.querySelectorAll('input[name="basemap"]').forEach(r => {
